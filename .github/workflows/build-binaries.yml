name: Build Binaries

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to build (e.g., v8.05.2026)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      RELEASE_TAG: ${{ github.event.inputs.tag || github.ref_name }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ env.RELEASE_TAG }}

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: 1.2.20

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          registry-url: 'https://registry.npmjs.org'
          cache: npm

      - name: Build binaries
        run: ./scripts/build-binaries.sh

      - name: Extract changelog for this version
        id: changelog
        shell: bash
        run: |
          VERSION="${RELEASE_TAG#v}"
          cd packages/cli
          awk "/^## \\[${VERSION}\\]/{flag=1; next} /^## \\[/{flag=0} flag" CHANGELOG.md > /tmp/release-notes.md
          if [ ! -s /tmp/release-notes.md ]; then
            cat > /tmp/release-notes.md <<EOF
          Release ${VERSION}

          - Windows x64 binary
          - Linux x64 / arm64 binaries
          - macOS x64 / arm64 binaries
          EOF
          fi

      - name: Create GitHub Release and upload binaries
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        shell: bash
        run: |
          cd packages/cli/binaries
          gh release create "${RELEASE_TAG}" \
            --title "${RELEASE_TAG}" \
            --notes-file /tmp/release-notes.md \
            mooncli-darwin-arm64.tar.gz \
            mooncli-darwin-x64.tar.gz \
            mooncli-linux-x64.tar.gz \
            mooncli-linux-arm64.tar.gz \
            mooncli-windows-x64.zip \
            2>/dev/null || \
          gh release upload "${RELEASE_TAG}" \
            mooncli-darwin-arm64.tar.gz \
            mooncli-darwin-x64.tar.gz \
            mooncli-linux-x64.tar.gz \
            mooncli-linux-arm64.tar.gz \
            mooncli-windows-x64.zip \
            --clobber
