name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-check-smoke:
    name: ${{ matrix.os }} / node ${{ matrix.node }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node: [22]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node }}
          cache: npm

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libcairo2-dev libpango1.0-dev libjpeg-dev libgif-dev librsvg2-dev fd-find ripgrep
          sudo ln -sf $(which fdfind) /usr/local/bin/fd

      - name: Install macOS helper tools
        if: runner.os == 'macOS'
        run: brew install fd ripgrep

      - name: Install Windows helper tools
        if: runner.os == 'Windows'
        shell: pwsh
        run: choco install fd ripgrep -y

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Check
        run: npm run check

      - name: Package smoke
        run: node -e "const root=require('./package.json'); const cli=require('./packages/cli/package.json'); if (root.version !== cli.version) process.exit(1); console.log(cli.name + '@' + cli.version)"
