<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>MoonCode | Bridge Console</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&family=JetBrains+Mono:wght@500;700&display=swap');

    :root {
      --bg: #000000;
      --surface: #0a0a0a;
      --border: #1a1a1a;
      --accent: #ffffff;
      --blue: #007aff;
      --green: #34c759;
      --red: #ff3b30;
      --text: #ffffff;
      --text-muted: #666666;
    }

    * {
      box-sizing: border-box;
      transition: all 0.2s ease;
    }

    body {
      margin: 0;
      padding: 0;
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    .navbar {
      padding: 24px 48px;
      background: #050505;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      position: sticky;
      top: 0;
      z-index: 100;
    }

    .logo-group {
      display: flex;
      align-items: center;
      gap: 16px;
    }

    .logo-box {
      width: 36px;
      height: 36px;
      border: 2px solid #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      font-weight: 800;
    }

    .logo-text h1 {
      margin: 0;
      font-size: 20px;
      font-weight: 800;
      letter-spacing: 1px;
    }

    .logo-text p {
      margin: 0;
      font-size: 10px;
      color: var(--text-muted);
      letter-spacing: 2px;
    }

    .main {
      max-width: 1200px;
      margin: 60px auto;
      padding: 0 48px;
    }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 32px;
      margin-bottom: 60px;
    }

    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 32px;
      border-radius: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    .stat-icon {
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .stat-label {
      font-size: 11px;
      font-weight: 600;
      color: var(--text-muted);
      text-transform: uppercase;
      letter-spacing: 1.5px;
    }

    .stat-value {
      font-size: 36px;
      font-weight: 800;
      font-family: 'JetBrains Mono', monospace;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 24px;
    }

    .node-card {
      background: var(--surface);
      border: 1px solid var(--border);
      padding: 24px;
      border-radius: 16px;
      position: relative;
    }

    .node-card:hover {
      border-color: #333;
      transform: translateY(-2px);
    }

    .node-card.active {
      border-color: #444;
      background: #0d0d0d;
      box-shadow: 0 0 20px rgba(52, 199, 89, 0.05);
    }

    .node-card.active::before {
      content: '';
      position: absolute;
      top: 16px;
      right: 16px;
      width: 8px;
      height: 8px;
      background: var(--green);
      border-radius: 50%;
      box-shadow: 0 0 10px var(--green);
    }

    .card-header {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 24px;
    }

    .port-id {
      font-family: 'JetBrains Mono', monospace;
      font-size: 20px;
      font-weight: 700;
    }

    .node-info {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .info-row {
      display: flex;
      justify-content: space-between;
      font-size: 13px;
    }

    .info-key { color: var(--text-muted); }
    .info-val { font-family: 'JetBrains Mono', monospace; font-weight: 600; }

    .caps {
      margin-top: 20px;
      padding-top: 20px;
      border-top: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .cap-tag {
      font-size: 9px;
      padding: 2px 8px;
      background: #111;
      border: 1px solid #222;
      border-radius: 6px;
      color: #777;
      text-transform: uppercase;
    }

    .refresh-btn {
      background: #fff;
      color: #000;
      border: none;
      padding: 12px 24px;
      border-radius: 12px;
      font-weight: 800;
      font-size: 12px;
      letter-spacing: 1px;
      text-transform: uppercase;
      cursor: pointer;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .refresh-btn:hover {
      background: #ccc;
    }

    @keyframes spin {
      from { transform: rotate(0deg); }
      to { transform: rotate(360deg); }
    }
    .spinning { animation: spin 1s linear infinite; }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: #000; }
    ::-webkit-scrollbar-thumb { background: #222; }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="logo-group">
      <div class="logo-box">M</div>
      <div class="logo-text">
        <h1>MOONCODE</h1>
        <p>COMMAND CENTER</p>
      </div>
    </div>
    <button class="refresh-btn" id="refresh-btn">
      <svg id="sync-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3">
        <path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"></path>
      </svg>
      Sync Nodes
    </button>
  </nav>

  <main class="main">
    <div class="stats-row">
      <div class="stat-card">
        <div class="stat-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M12 2L2 7l10 5 10-5-10-5zM2 17l10 5 10-5M2 12l10 5 10-5"></path></svg>
        </div>
        <span class="stat-label">Active Sessions</span>
        <div class="stat-value" id="active-nodes">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
        </div>
        <span class="stat-label">Total Clients</span>
        <div class="stat-value" id="total-clients">0</div>
      </div>
      <div class="stat-card">
        <div class="stat-icon">
          <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="22 12 18 12 15 21 9 3 6 12 2 12"></polyline></svg>
        </div>
        <span class="stat-label">System Load</span>
        <div class="stat-value">2%</div>
      </div>
    </div>

    <div class="grid" id="nodes-grid">
      <!-- Injected -->
    </div>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
