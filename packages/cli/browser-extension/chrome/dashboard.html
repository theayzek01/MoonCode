<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>MoonCode — Bridge Console</title>
  <style>
    :root {
      --bg:      oklch(9% 0.01 260);
      --surface: oklch(14% 0.012 260);
      --card:    oklch(17% 0.01 260);
      --border:  oklch(26% 0.008 260);
      --fg:      oklch(92% 0.008 260);
      --muted:   oklch(52% 0.012 260);
      --accent:  oklch(72% 0.16 200);
      --success: oklch(70% 0.18 145);
      --danger:  oklch(62% 0.22 25);
      --warn:    oklch(78% 0.18 75);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      background: var(--bg);
      color: var(--fg);
      min-height: 100vh;
    }

    /* ── Navbar ── */
    nav {
      position: sticky; top: 0; z-index: 100;
      padding: 0 32px;
      height: 56px;
      background: oklch(10% 0.01 260 / 0.92);
      border-bottom: 1px solid var(--border);
      backdrop-filter: blur(12px);
      display: flex; align-items: center; justify-content: space-between;
    }

    .nav-brand { display: flex; align-items: center; gap: 12px; }
    .nav-logo {
      width: 32px; height: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }
    .nav-name { font-size: 15px; font-weight: 700; letter-spacing: -0.3px; }
    .nav-sub  { font-size: 10px; color: var(--muted); letter-spacing: 0.5px; text-transform: uppercase; }

    .nav-actions { display: flex; align-items: center; gap: 8px; }

    .btn {
      display: inline-flex; align-items: center; gap: 7px;
      padding: 7px 14px; border-radius: 7px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: 1px solid transparent; transition: opacity 0.15s;
    }
    .btn:hover { opacity: 0.8; }
    .btn img { width: 13px; height: 13px; image-rendering: pixelated; }
    .btn-primary  { background: var(--fg); color: var(--bg); }
    .btn-ghost    { background: transparent; color: var(--fg); border-color: var(--border); }
    .btn-danger   { background: color-mix(in oklch, var(--danger) 12%, transparent); color: var(--danger); border-color: color-mix(in oklch, var(--danger) 22%, transparent); }

    /* ── Main layout ── */
    .main { max-width: 1100px; margin: 0 auto; padding: 32px 32px; }

    /* ── Stats row ── */
    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 16px; margin-bottom: 28px;
    }

    .stat {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 20px 22px;
      display: flex; align-items: center; gap: 14px;
    }
    .stat-icon { width: 28px; height: 28px; image-rendering: pixelated; opacity: 0.75; }
    .stat-right {}
    .stat-label { font-size: 10px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.7px; color: var(--muted); margin-bottom: 4px; }
    .stat-value { font-size: 28px; font-weight: 800; font-variant-numeric: tabular-nums; letter-spacing: -1px; line-height: 1; }

    /* ── Grid ── */
    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 14px;
    }

    /* ── Node card ── */
    .node-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 18px 20px;
      position: relative;
      transition: border-color 0.2s;
    }
    .node-card:hover { border-color: oklch(38% 0.008 260); }
    .node-card.active {
      border-color: color-mix(in oklch, var(--success) 35%, var(--border));
    }

    .status-dot {
      position: absolute; top: 16px; right: 16px;
      width: 8px; height: 8px; border-radius: 50%;
    }
    .status-dot.active {
      background: var(--success);
      box-shadow: 0 0 8px var(--success);
      animation: pulse-dot 2s ease-in-out infinite;
    }
    .status-dot.offline { background: var(--muted); }

    @keyframes pulse-dot {
      0%,100% { opacity: 1; }
      50%      { opacity: 0.5; }
    }

    .card-head {
      display: flex; align-items: center; gap: 10px;
      margin-bottom: 16px;
    }
    .card-icon { width: 20px; height: 20px; image-rendering: pixelated; opacity: 0.7; }
    .port-id {
      font-size: 18px; font-weight: 800;
      font-variant-numeric: tabular-nums;
      letter-spacing: -0.5px;
    }
    .card-status-text {
      font-size: 10px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.6px;
      margin-left: auto; padding: 2px 8px; border-radius: 999px;
    }
    .card-status-text.active  { color: var(--success); background: color-mix(in oklch, var(--success) 10%, transparent); }
    .card-status-text.offline { color: var(--muted);   background: color-mix(in oklch, var(--muted) 10%, transparent); }

    .info-row {
      display: flex; justify-content: space-between; align-items: center;
      padding: 5px 0;
      border-bottom: 1px solid var(--border);
    }
    .info-row:last-of-type { border-bottom: none; }
    .info-key { font-size: 11px; color: var(--muted); font-weight: 500; }
    .info-val { font-size: 11px; font-weight: 600; font-variant-numeric: tabular-nums; }

    .caps {
      margin-top: 12px;
      display: flex; flex-wrap: wrap; gap: 5px;
    }
    .cap-tag {
      font-size: 9px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.3px;
      padding: 2px 7px; border-radius: 4px;
      background: var(--surface); border: 1px solid var(--border);
      color: var(--muted);
    }
    .cap-tag.highlight { color: var(--accent); border-color: color-mix(in oklch, var(--accent) 30%, transparent); }

    .terminate-btn {
      margin-top: 14px; width: 100%;
      background: color-mix(in oklch, var(--danger) 8%, transparent);
      border: 1px solid color-mix(in oklch, var(--danger) 18%, transparent);
      color: var(--danger);
      padding: 8px 12px; border-radius: 7px;
      font-size: 11px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px;
      cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 7px;
      transition: background 0.15s;
    }
    .terminate-btn img { width: 12px; height: 12px; image-rendering: pixelated; }
    .terminate-btn:hover {
      background: var(--danger); color: white;
    }

    /* ── Empty state ── */
    .empty {
      grid-column: 1 / -1;
      text-align: center; padding: 64px 32px;
      color: var(--muted);
    }
    .empty img { width: 48px; height: 48px; image-rendering: pixelated; opacity: 0.35; margin-bottom: 16px; }
    .empty h3 { font-size: 15px; margin-bottom: 8px; color: var(--fg); }
    .empty p  { font-size: 13px; line-height: 1.6; }

    /* ── Scrollbar ── */
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }

    /* ── Spin ── */
    @keyframes spin { to { transform: rotate(360deg); } }
    .spinning { animation: spin 0.7s linear infinite; }
  </style>
</head>
<body>
  <nav>
    <div class="nav-brand">
      <div class="nav-logo">☾</div>
      <div>
        <div class="nav-name">MoonCode</div>
        <div class="nav-sub">Bridge Console</div>
      </div>
    </div>
    <div class="nav-actions">
      <button class="btn btn-ghost" id="refresh-btn">
        <img id="sync-icon" src="icons/Browser/5. Refresh.png" alt="">
        Yenile
      </button>
      <button class="btn btn-danger" id="close-all-btn">
        <img src="icons/Browser/9. Close or Multiply.png" alt="">
        Tümünü Kapat
      </button>
    </div>
  </nav>

  <main class="main">
    <!-- Stats -->
    <div class="stats-row">
      <div class="stat">
        <img class="stat-icon" src="icons/Computer Systems/8. Wifi Excellent.png" alt="">
        <div class="stat-right">
          <div class="stat-label">Aktif Oturumlar</div>
          <div class="stat-value" id="active-nodes">0</div>
        </div>
      </div>
      <div class="stat">
        <img class="stat-icon" src="icons/Social/1. Profile.png" alt="">
        <div class="stat-right">
          <div class="stat-label">Toplam İstemci</div>
          <div class="stat-value" id="total-clients">0</div>
        </div>
      </div>
      <div class="stat">
        <img class="stat-icon" src="icons/Computer Systems/15. Wait.png" alt="">
        <div class="stat-right">
          <div class="stat-label">Sürüm</div>
          <div class="stat-value" style="font-size:16px;letter-spacing:-0.3px">2026-v36</div>
        </div>
      </div>
    </div>

    <!-- Node grid -->
    <div class="grid" id="nodes-grid">
      <div class="empty">
        <img src="icons/Computer Systems/11. No Wifi.png" alt="">
        <h3>Bağlı oturum yok</h3>
        <p>MoonCode CLI'ı başlatın ve eklentiyi Chrome'a yükleyin.<br>Bağlantı kurulunca kartlar buraya gelir.</p>
      </div>
    </div>
  </main>

  <script src="dashboard.js"></script>
</body>
</html>
