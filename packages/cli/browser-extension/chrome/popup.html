<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MoonCode</title>
  <style>
    :root {
      --bg: oklch(10% 0.01 260);
      --surface: oklch(15% 0.012 260);
      --card: oklch(18% 0.01 260);
      --border: oklch(28% 0.008 260);
      --fg: oklch(94% 0.008 260);
      --muted: oklch(55% 0.012 260);
      --accent: oklch(72% 0.16 200);
      --success: oklch(70% 0.18 145);
      --danger: oklch(64% 0.22 25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; min-height: 100%; }

    body {
      min-width: 300px;
      max-width: 100vw;
      min-height: 100vh;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      user-select: none;
      overflow-x: hidden;
      overflow-y: auto;
    }

    .shell {
      display: flex;
      flex-direction: column;
      min-height: 100vh;
      width: 100%;
    }

    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
      background: linear-gradient(180deg, color-mix(in oklch, var(--surface) 78%, transparent), transparent);
    }

    .logo {
      width: 32px;
      height: 32px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 9px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-text {
      flex: 1;
      min-width: 0;
    }

    .header-title {
      font-size: 15px;
      font-weight: 650;
      letter-spacing: -0.2px;
      line-height: 1.1;
    }

    .header-sub {
      font-size: 11px;
      color: var(--muted);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .badge {
      font-size: 9px;
      font-weight: 800;
      padding: 4px 9px;
      border-radius: 999px;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      flex-shrink: 0;
      border: 1px solid transparent;
    }

    .badge.on {
      background: color-mix(in oklch, var(--success) 15%, transparent);
      color: var(--success);
      border-color: color-mix(in oklch, var(--success) 28%, transparent);
    }

    .badge.waiting {
      background: color-mix(in oklch, var(--accent) 14%, transparent);
      color: var(--accent);
      border-color: color-mix(in oklch, var(--accent) 26%, transparent);
    }

    .badge.off {
      background: color-mix(in oklch, var(--danger) 12%, transparent);
      color: var(--danger);
      border-color: color-mix(in oklch, var(--danger) 24%, transparent);
    }

    .status-note {
      padding: 10px 16px 0;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.45;
      min-height: 24px;
    }

    .section-label {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      color: var(--muted);
      letter-spacing: 0.7px;
      padding: 12px 16px 6px;
    }

    .port-list {
      display: flex;
      flex-direction: column;
      gap: 6px;
      padding: 0 16px;
      max-height: 176px;
      overflow-y: auto;
    }

    .port-list::-webkit-scrollbar { width: 3px; }
    .port-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .empty-state {
      margin: 0 16px;
      padding: 14px 12px;
      border: 1px dashed var(--border);
      border-radius: 10px;
      color: var(--muted);
      font-size: 11px;
      line-height: 1.5;
      background: color-mix(in oklch, var(--card) 60%, transparent);
    }

    .port-row {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 9px 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
    }

    .port-icon {
      width: 14px;
      height: 14px;
      image-rendering: pixelated;
      opacity: 0.8;
      flex-shrink: 0;
    }

    .port-label {
      flex: 1;
      font-size: 12px;
      font-weight: 550;
      font-variant-numeric: tabular-nums;
      min-width: 0;
    }

    .port-badge {
      font-size: 9px;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 0.4px;
      padding: 2px 6px;
      border-radius: 4px;
      white-space: nowrap;
    }

    .port-badge.active {
      background: color-mix(in oklch, var(--success) 12%, transparent);
      color: var(--success);
    }

    .port-badge.connecting {
      background: color-mix(in oklch, var(--accent) 12%, transparent);
      color: var(--accent);
    }

    .port-badge.scanning {
      background: color-mix(in oklch, var(--muted) 10%, transparent);
      color: var(--muted);
    }

    .close-btn {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--danger);
      font-size: 11px;
      font-weight: 800;
      padding: 2px 5px;
      border-radius: 4px;
      opacity: 0.7;
      transition: opacity 0.15s;
    }

    .close-btn:hover { opacity: 1; }

    .actions {
      display: flex;
      flex-direction: column;
      gap: 7px;
      padding: 12px 16px 14px;
    }

    .btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      width: 100%;
      padding: 9px 12px;
      border-radius: 8px;
      font-size: 12px;
      font-weight: 650;
      cursor: pointer;
      border: none;
      transition: transform 0.14s ease, opacity 0.14s ease, background 0.14s ease;
    }

    .btn:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn img { width: 14px; height: 14px; image-rendering: pixelated; }

    .btn-primary { background: var(--fg); color: var(--bg); }
    .btn-secondary { background: var(--card); color: var(--fg); border: 1px solid var(--border); }
    .btn-danger {
      background: color-mix(in oklch, var(--danger) 10%, transparent);
      color: var(--danger);
      border: 1px solid color-mix(in oklch, var(--danger) 20%, transparent);
    }

    .divider { height: 1px; background: var(--border); margin: 0 16px; }

    .footer {
      padding: 8px 16px 12px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      color: var(--muted);
      font-size: 10px;
      font-variant-numeric: tabular-nums;
    }

    .version { color: inherit; }

    @media (max-width: 340px) {
      .header,
      .status-note,
      .section-label,
      .actions,
      .footer {
        padding-left: 12px;
        padding-right: 12px;
      }

      .header-title {
        font-size: 14px;
      }

      .btn {
        font-size: 11px;
        padding: 8px 10px;
      }
    }
  </style>
</head>
<body>
  <div class="shell">
    <div class="header">
      <div class="logo">☾</div>
      <div class="header-text">
        <div class="header-title">MoonCode</div>
        <div class="header-sub">Tarayıcı Köprüsü</div>
      </div>
      <span id="overall-status" class="badge off">Bağlantı Yok</span>
    </div>

    <div id="status-note" class="status-note">Köprü açık olduğunda burada aktif portlar görünür.</div>

    <div class="section-label">Port durumu</div>
    <div id="port-list" class="port-list"></div>

    <div class="divider" style="margin-top:10px;"></div>

    <div class="actions">
      <button class="btn btn-primary" id="reconnect-btn">
        <img id="refresh-icon" src="icons/Browser/5. Refresh.png" alt="">
        Portları Yeniden Tara
      </button>
      <button class="btn btn-secondary" id="dashboard-btn">
        <img src="icons/Computer Systems/8. Wifi Excellent.png" alt="">
        Köprü Konsolunu Aç
      </button>
      <button class="btn btn-danger" id="close-all-btn">
        <img src="icons/Browser/9. Close or Multiply.png" alt="">
        Tüm Oturumları Kapat
      </button>
    </div>

    <div class="divider"></div>
    <div class="footer">
      <span class="version" id="extension-version">2026-v38</span>
      <span class="version" id="client-count">0 istemci</span>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
