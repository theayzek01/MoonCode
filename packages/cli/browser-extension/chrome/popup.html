<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>MoonCode</title>
  <style>
    :root {
      --bg: oklch(11% 0.01 260);
      --surface: oklch(16% 0.012 260);
      --card: oklch(19% 0.01 260);
      --border: oklch(28% 0.008 260);
      --fg: oklch(92% 0.008 260);
      --muted: oklch(55% 0.012 260);
      --accent: oklch(72% 0.16 200);
      --success: oklch(70% 0.18 145);
      --danger: oklch(62% 0.22 25);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 320px;
      background: var(--bg);
      color: var(--fg);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
      font-size: 13px;
      user-select: none;
    }

    /* ── Header ── */
    .header {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px 12px;
      border-bottom: 1px solid var(--border);
    }

    .logo {
      width: 30px; height: 30px;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      flex-shrink: 0;
    }

    .header-text { flex: 1; }
    .header-title {
      font-size: 14px; font-weight: 600;
      letter-spacing: -0.2px;
      line-height: 1.2;
    }
    .header-sub {
      font-size: 10px; color: var(--muted);
      margin-top: 1px;
    }

    .badge {
      font-size: 9px; font-weight: 700;
      padding: 2px 8px; border-radius: 999px;
      text-transform: uppercase; letter-spacing: 0.6px;
      flex-shrink: 0;
    }
    .badge.on  { background: color-mix(in oklch, var(--success) 15%, transparent); color: var(--success); border: 1px solid color-mix(in oklch, var(--success) 30%, transparent); }
    .badge.off { background: color-mix(in oklch, var(--danger) 12%, transparent);  color: var(--danger);  border: 1px solid color-mix(in oklch, var(--danger) 25%, transparent); }

    /* ── Ports ── */
    .section-label {
      font-size: 10px; font-weight: 600; text-transform: uppercase;
      color: var(--muted); letter-spacing: 0.6px;
      padding: 12px 16px 6px;
    }

    .port-list {
      display: flex; flex-direction: column; gap: 4px;
      padding: 0 16px;
      max-height: 152px; overflow-y: auto;
    }
    .port-list::-webkit-scrollbar { width: 3px; }
    .port-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    .port-row {
      display: flex; align-items: center; gap: 8px;
      padding: 8px 10px;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 7px;
    }
    .port-icon { width: 14px; height: 14px; image-rendering: pixelated; opacity: 0.7; }
    .port-label { flex: 1; font-size: 12px; font-weight: 500; font-variant-numeric: tabular-nums; }
    .port-badge {
      font-size: 9px; font-weight: 700; text-transform: uppercase; letter-spacing: 0.4px;
      padding: 2px 6px; border-radius: 4px;
    }
    .port-badge.active   { background: color-mix(in oklch, var(--success) 12%, transparent); color: var(--success); }
    .port-badge.scanning { background: color-mix(in oklch, var(--muted) 10%, transparent);   color: var(--muted); }
    .close-btn {
      background: none; border: none; cursor: pointer;
      color: var(--danger); font-size: 11px; font-weight: 700;
      padding: 2px 5px; border-radius: 4px;
      opacity: 0.7; transition: opacity 0.15s;
    }
    .close-btn:hover { opacity: 1; }

    /* ── Actions ── */
    .actions {
      display: flex; flex-direction: column; gap: 6px;
      padding: 12px 16px 14px;
    }

    .btn {
      display: flex; align-items: center; justify-content: center; gap: 8px;
      width: 100%; padding: 9px 12px; border-radius: 7px;
      font-size: 12px; font-weight: 600; cursor: pointer;
      border: none; transition: opacity 0.15s, background 0.15s;
    }
    .btn:hover { opacity: 0.85; }
    .btn img { width: 14px; height: 14px; image-rendering: pixelated; }

    .btn-primary { background: var(--fg); color: var(--bg); }
    .btn-secondary { background: var(--card); color: var(--fg); border: 1px solid var(--border); }
    .btn-danger    { background: color-mix(in oklch, var(--danger) 10%, transparent); color: var(--danger); border: 1px solid color-mix(in oklch, var(--danger) 20%, transparent); }

    .divider { height: 1px; background: var(--border); margin: 0 16px; }

    /* ── Version footer ── */
    .footer {
      padding: 8px 16px;
      display: flex; align-items: center; justify-content: space-between;
    }
    .version { font-size: 10px; color: var(--muted); font-variant-numeric: tabular-nums; }
  </style>
</head>
<body>
  <!-- Header -->
  <div class="header">
    <div class="logo">☾</div>
    <div class="header-text">
      <div class="header-title">MoonCode</div>
      <div class="header-sub">Tarayıcı Köprüsü</div>
    </div>
    <span id="overall-status" class="badge off">Bağlantı Yok</span>
  </div>

  <!-- Ports -->
  <div class="section-label">Aktif Portlar</div>
  <div id="port-list" class="port-list"></div>

  <div class="divider" style="margin-top:10px;"></div>

  <!-- Actions -->
  <div class="actions">
    <button class="btn btn-primary" id="reconnect-btn">
      <img id="refresh-icon" src="icons/Browser/5. Refresh.png" alt="">
      Portları Yeniden Tara
    </button>
    <button class="btn btn-secondary" id="dashboard-btn">
      <img src="icons/Computer Systems/8. Wifi Excellent.png" alt="">
      Köprü Konsolunu Aç
    </button>
    <button class="btn btn-danger" id="close-all-btn">
      <img src="icons/Browser/9. Close or Multiply.png" alt="">
      Tüm Oturumları Kapat
    </button>
  </div>

  <div class="divider"></div>
  <div class="footer">
    <span class="version">2026-v35</span>
    <span class="version" id="client-count">0 istemci</span>
  </div>

  <script src="popup.js"></script>
</body>
</html>
